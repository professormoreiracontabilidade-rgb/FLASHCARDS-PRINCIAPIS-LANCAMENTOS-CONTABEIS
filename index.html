<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Top 21 Lançamentos FGV - Professor Moreira</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(180deg,#e8f5ff,#fff5fa);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  color:#111;
}
.header,.footer{
  background:#0b3d91;
  color:#fff;
  text-align:center;
  padding:10px 8px;
  font-weight:700;
  font-size:14px;
  line-height:1.35;
}
.footer{font-size:13px;margin-top:auto}
.wrapper{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:16px 12px;
}
.progress{
  width:100%;
  max-width:430px;
  text-align:center;
  font-size:15px;
  font-weight:700;
  color:#0b3d91;
  margin-bottom:10px;
}
.card-area{
  width:100%;
  max-width:430px;
  height:68vh;
  min-height:470px;
  perspective:1200px;
}
.card{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .55s ease;
  cursor:pointer;
}
.card.flipped{transform:rotateY(180deg)}
.face{
  position:absolute;
  inset:0;
  border-radius:22px;
  padding:22px 18px;
  backface-visibility:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.22);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  border:3px solid rgba(11,61,145,.18);
  overflow:auto;
}
.front{background:#bfe9ff}
.back{background:#ffd6e8;transform:rotateY(180deg)}
.badge{
  background:#0b3d91;
  color:#fff;
  padding:7px 13px;
  border-radius:999px;
  font-weight:700;
  font-size:14px;
  margin-bottom:16px;
}
h1{
  font-size:30px;
  color:#062d6f;
  line-height:1.15;
  margin-bottom:16px;
  text-transform:uppercase;
}
h2{
  font-size:23px;
  color:#7a0036;
  margin-bottom:12px;
  text-transform:uppercase;
}
.tap{font-size:16px;font-weight:700;color:#333;margin-top:10px}
.entry{
  width:100%;
  text-align:left;
  font-size:20px;
  line-height:1.35;
}
.entry p{margin:8px 0}
.section-title{
  font-weight:800;
  color:#7a0036;
  text-align:center;
  font-size:20px;
  margin:10px 0 8px;
}
.d,.c{font-weight:800}
.d{color:#003f88}.c{color:#8a0033}
.note{
  background:rgba(255,255,255,.55);
  border-left:5px solid #0b3d91;
  padding:8px 10px;
  border-radius:8px;
  font-size:17px;
  margin-top:10px;
}
.nav{
  width:100%;
  max-width:430px;
  display:flex;
  gap:8px;
  margin-top:14px;
}
button{
  flex:1;
  border:none;
  border-radius:12px;
  background:#0b3d91;
  color:#fff;
  padding:13px 8px;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
}
button:active{transform:scale(.98)}
@media(max-width:380px){
  h1{font-size:25px}.entry{font-size:18px}.card-area{min-height:450px;height:66vh}
}
</style>
</head>
<body>
<div class="header">CURSO DE CONTABILIDADE PROFESSOR MOREIRA<br>WHATSAPP 61 985323574</div>
<div class="wrapper">
  <div class="progress" id="progress"></div>
  <div class="card-area">
    <div class="card" id="card" onclick="flipCard()">
      <div class="face front" id="front"></div>
      <div class="face back" id="back"></div>
    </div>
  </div>
  <div class="nav">
    <button onclick="prevCard(event)">VOLTAR</button>
    <button onclick="restart(event)">REINICIAR</button>
    <button onclick="nextCard(event)">AVANÇAR</button>
  </div>
</div>
<div class="footer">CURSO DE CONTABILIDADE PROFESSOR MOREIRA • WHATSAPP 61 985323574</div>
<script>
const cards = [
{t:'Subscrição do Capital Social',b:`<div class="entry"><p><span class="d">D – Capital a Integralizar</span> <br>(PL - Redutora)</p><p><span class="c">C – Capital Social</span> <br>(PL)</p><div class="note">Os sócios assumem o compromisso de entregar recursos à entidade.</div></div>`},
{t:'Integralização do Capital Social',b:`<div class="entry"><p><span class="d">D – Caixa/Bancos/Bens</span> <br>(Ativo)</p><p><span class="c">C – Capital a Integralizar</span> <br>(PL - Redutora)</p><div class="note">O sócio entrega dinheiro ou bens prometidos na subscrição.</div></div>`},
{t:'Compra de Mercadorias com ICMS a Recuperar',b:`<div class="entry"><div class="section-title">Compra a prazo com ICMS recuperável</div><p><span class="d">D – Estoques</span></p><p><span class="d">D – ICMS a Recuperar</span></p><p><span class="c">C – Fornecedores</span></p><div class="note">Na compra, o ICMS recuperável não compõe o custo do estoque.</div></div>`},
{t:'Venda de Mercadorias + Baixa do CMV',b:`<div class="entry"><div class="section-title">1º lançamento – venda</div><p><span class="d">D – Caixa/Clientes</span></p><p><span class="c">C – Receita de Vendas</span></p><div class="section-title">2º lançamento – baixa do estoque</div><p><span class="d">D – CMV</span></p><p><span class="c">C – Estoques</span></p></div>`},
{t:'ICMS sobre Vendas',b:`<div class="entry"><p><span class="d">D – Deduções da Receita Bruta</span></p><p><span class="c">C – ICMS a Recolher</span></p><div class="note">Na venda, o ICMS reduz a receita bruta.</div></div>`},
{t:'Seguros',b:`<div class="entry"><div class="section-title">1º lançamento – pagamento antecipado</div><p><span class="d">D – Seguros a Apropriar</span></p><p><span class="c">C – Caixa/Bancos</span></p><div class="section-title">2º lançamento – apropriação mensal</div><p><span class="d">D – Despesa com Seguros</span></p><p><span class="c">C – Seguros a Apropriar</span></p></div>`},
{t:'Receita Recebida Antecipadamente',b:`<div class="entry"><p><span class="d">D – Caixa/Bancos</span></p><p><span class="c">C – Receita Antecipada</span> <br>(Passivo)</p><div class="note">Recebeu antes de prestar o serviço ou entregar o bem.</div></div>`},
{t:'Apropriação da Receita Antecipada',b:`<div class="entry"><p><span class="d">D – Receita Antecipada</span> <br>(Passivo)</p><p><span class="c">C – Receita de Serviços/Vendas</span></p><div class="note">A receita só vai ao resultado quando for ganha.</div></div>`},
{t:'Depreciação',b:`<div class="entry"><p><span class="d">D – Despesa de Depreciação</span></p><p><span class="c">C – Depreciação Acumulada</span> <br>(Ativo - Redutora)</p><div class="note">Se for máquina da fábrica, pode ir para custo de produção.</div></div>`},
{t:'Constituição da PECLD',b:`<div class="entry"><p><span class="d">D – Despesa com PECLD</span></p><p><span class="c">C – PECLD</span> <br>(Ativo - Redutora de Clientes)</p><div class="note">Perda estimada com créditos de liquidação duvidosa.</div></div>`},
{t:'Ajuste a Valor Presente - AVP',b:`<div class="entry"><div class="section-title">Venda a prazo com AVP</div><p><span class="d">D – Clientes</span></p><p><span class="c">C – Receita de Vendas</span></p><p><span class="c">C – Juros a Apropriar / AVP</span></p><div class="note">Depois, os juros são apropriados como receita financeira.</div></div>`},
{t:'Equivalência Patrimonial',b:`<div class="entry"><div class="section-title">Lucro da investida</div><p><span class="d">D – Investimentos</span></p><p><span class="c">C – Receita de Equivalência Patrimonial</span></p><div class="section-title">Prejuízo da investida</div><p><span class="d">D – Despesa de Equivalência Patrimonial</span></p><p><span class="c">C – Investimentos</span></p></div>`},
{t:'Dividendos Obrigatórios',b:`<div class="entry"><p><span class="d">D – Lucros Acumulados</span></p><p><span class="c">C – Dividendos a Pagar</span> <br>(Passivo)</p><div class="note">Destinação do lucro aos sócios ou acionistas.</div></div>`},
{t:'Constituição da Reserva Legal',b:`<div class="entry"><p><span class="d">D – Lucros Acumulados</span></p><p><span class="c">C – Reserva Legal</span></p><div class="note">Transferência dentro do Patrimônio Líquido.</div></div>`},
{t:'Apropriação e Pagamento de Salários',b:`<div class="entry"><div class="section-title">1º lançamento – apropriação</div><p><span class="d">D – Despesa com Salários</span></p><p><span class="c">C – Salários a Pagar</span></p><div class="section-title">2º lançamento – pagamento</div><p><span class="d">D – Salários a Pagar</span></p><p><span class="c">C – Caixa/Bancos</span></p><div class="note">Pagamento normalmente até o 5º dia útil do mês seguinte ao da apropriação.</div></div>`},
{t:'Apropriação do FGTS',b:`<div class="entry"><p><span class="d">D – Despesa com FGTS</span></p><p><span class="c">C – FGTS a Recolher</span></p><div class="note">Encargo da empresa reconhecido por competência.</div></div>`},
{t:'Adiantamento de Clientes',b:`<div class="entry"><p><span class="d">D – Caixa/Bancos</span></p><p><span class="c">C – Adiantamento de Clientes</span> <br>(Passivo)</p><div class="note">A empresa recebeu antes de entregar o produto ou serviço.</div></div>`},
{t:'Adiantamento a Fornecedores',b:`<div class="entry"><p><span class="d">D – Adiantamento a Fornecedores</span> <br>(Ativo)</p><p><span class="c">C – Caixa/Bancos</span></p><div class="note">A empresa pagou antes de receber mercadorias ou serviços.</div></div>`},
{t:'Adiantamento de Salários',b:`<div class="entry"><p><span class="d">D – Adiantamento de Salários</span> <br>(Ativo)</p><p><span class="c">C – Caixa/Bancos</span></p><div class="note">Quando a folha for apropriada, esse adiantamento será compensado.</div></div>`},
{t:'Desconto de Duplicatas',b:`<div class="entry"><p><span class="d">D – Bancos</span></p><p><span class="d">D – Encargos Financeiros a Transcorrer</span></p><p><span class="c">C – Empréstimos por Duplicatas Descontadas</span></p><div class="note">Após CPC 48, normalmente tratado como passivo financeiro.</div></div>`},
{t:'Compra e Venda de Imobilizado',b:`<div class="entry"><div class="section-title">Compra de imobilizado</div><p><span class="d">D – Imobilizado</span></p><p><span class="c">C – Caixa/Fornecedores</span></p><div class="section-title">Venda de imobilizado</div><p><span class="d">D – Caixa/Clientes</span></p><p><span class="c">C – Receita/Ganho na Venda do Imobilizado</span></p><div class="note">Na venda, também deve ocorrer a baixa do custo e da depreciação acumulada.</div></div>`}
];
let current = 0;
const card = document.getElementById('card');
const front = document.getElementById('front');
const back = document.getElementById('back');
const progress = document.getElementById('progress');
function render(){
  card.classList.remove('flipped');
  const item = cards[current];
  progress.textContent = `Cartão ${current+1} de ${cards.length}`;
  front.innerHTML = `<div class="badge">TOP LANÇAMENTOS FGV</div><h1>${item.t}</h1><div class="tap">TOQUE PARA VIRAR</div>`;
  back.innerHTML = `<h2>${item.t}</h2>${item.b}<div class="tap">TOQUE PARA VOLTAR</div>`;
}
function flipCard(){card.classList.toggle('flipped')}
function nextCard(e){e.stopPropagation(); current=(current+1)%cards.length; render()}
function prevCard(e){e.stopPropagation(); current=(current-1+cards.length)%cards.length; render()}
function restart(e){e.stopPropagation(); current=0; render()}
render();
</script>
</body>
</html>
