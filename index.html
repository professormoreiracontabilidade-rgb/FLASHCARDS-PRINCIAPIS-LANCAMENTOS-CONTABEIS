<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Top 23 Lançamentos Contábeis FGV - Flashcards Professor Moreira</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(180deg,#eaf7ff 0%,#fff1f7 100%);
    color:#102033;
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:430px;
    min-height:100vh;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .topo,.rodape{
    background:#0d47a1;
    color:#fff;
    text-align:center;
    border-radius:14px;
    padding:10px 8px;
    font-weight:800;
    box-shadow:0 4px 12px rgba(0,0,0,.18);
    line-height:1.35;
  }
  .topo .curso{font-size:15px;text-transform:uppercase;letter-spacing:.3px}
  .topo .whats,.rodape{font-size:14px}
  h1{
    text-align:center;
    font-size:20px;
    color:#0d47a1;
    line-height:1.2;
  }
  .sub{
    text-align:center;
    font-size:13px;
    color:#334;
    font-weight:700;
  }
  .area{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:430px;
  }
  .card{
    width:100%;
    height:430px;
    perspective:1000px;
    cursor:pointer;
    user-select:none;
  }
  .inner{
    width:100%;
    height:100%;
    position:relative;
    transition:transform .55s ease;
    transform-style:preserve-3d;
  }
  .card.flipped .inner{transform:rotateY(180deg)}
  .face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:24px;
    border:4px solid rgba(13,71,161,.35);
    box-shadow:0 10px 25px rgba(0,0,0,.22);
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    overflow:auto;
  }
  .front{background:#cfeeff}
  .back{background:#ffd6e8;transform:rotateY(180deg)}
  .badge{
    align-self:flex-end;
    background:#0d47a1;
    color:#fff;
    padding:6px 12px;
    border-radius:999px;
    font-weight:800;
    font-size:14px;
  }
  .frente-texto{
    text-align:center;
    font-weight:900;
    color:#0d47a1;
    font-size:30px;
    line-height:1.2;
    text-transform:uppercase;
  }
  .toque{
    text-align:center;
    font-weight:800;
    color:#0d47a1;
    font-size:15px;
  }
  .back h2{
    text-align:center;
    color:#ad1457;
    font-size:22px;
    line-height:1.18;
    margin-bottom:10px;
    text-transform:uppercase;
  }
  .bloco{
    background:rgba(255,255,255,.7);
    border-radius:16px;
    padding:12px;
    margin:8px 0;
    font-size:19px;
    line-height:1.35;
  }
  .rotulo{
    font-weight:900;
    color:#0d47a1;
    display:block;
    margin-bottom:5px;
  }
  .obs{
    font-size:15px;
    text-align:center;
    font-weight:700;
    color:#5b1232;
    line-height:1.3;
    margin-top:8px;
  }
  .nav{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
  }
  button{
    border:none;
    border-radius:14px;
    padding:13px 6px;
    background:#0d47a1;
    color:#fff;
    font-weight:900;
    font-size:15px;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,.18);
  }
  button:active{transform:scale(.98)}
  .contador{text-align:center;font-weight:900;color:#0d47a1;font-size:16px}
  @media(max-width:380px){.card{height:410px}.frente-texto{font-size:26px}.bloco{font-size:17px}.back h2{font-size:20px}}
</style>
</head>
<body>
<div class="app">
  <div class="topo">
    <div class="curso">Curso de Contabilidade Professor Moreira</div>
    <div class="whats">WhatsApp 61 985323574</div>
  </div>

  <h1>TOP LANÇAMENTOS CONTÁBEIS FGV</h1>
  <div class="sub">Flashcards Mobile — toque no cartão para virar</div>
  <div class="contador" id="contador">Cartão 1 de 23</div>

  <div class="area">
    <div class="card" id="card" onclick="virarCartao()">
      <div class="inner">
        <div class="face front">
          <div class="badge" id="numFrente">1/23</div>
          <div class="frente-texto" id="textoFrente"></div>
          <div class="toque">TOQUE PARA VER O LANÇAMENTO</div>
        </div>
        <div class="face back">
          <div class="badge" id="numVerso">1/23</div>
          <h2 id="tituloVerso"></h2>
          <div>
            <div class="bloco"><span class="rotulo">DÉBITO</span><div id="debito"></div></div>
            <div class="bloco"><span class="rotulo">CRÉDITO</span><div id="credito"></div></div>
            <div class="obs" id="obs"></div>
          </div>
          <div class="toque">TOQUE PARA VOLTAR</div>
        </div>
      </div>
    </div>
  </div>

  <div class="nav">
    <button onclick="anterior(event)">◀ Voltar</button>
    <button onclick="reiniciar(event)">↺ Reiniciar</button>
    <button onclick="proximo(event)">Avançar ▶</button>
  </div>

  <div class="rodape">Curso de Contabilidade Professor Moreira<br>WhatsApp 61 985323574</div>
</div>

<script>
const cards = [
  {
    t: "Subscrição do Capital Social",

  },
  {
    t: "Integralização do Capital Social",
    d: "Caixa, Bancos ou Bens",
    c: "Capital a Integralizar",

  },
  {
    t: "Compra de Mercadorias + ICMS a Recuperar",

    c: "Caixa/Bancos ou Fornecedores",
    o: "Tudo junto no mesmo fato contábil: o ICMS recuperável não entra no custo do estoque."
  },
  {
    t: "Venda de Mercadorias + Baixa do CMV",

    o: "Na venda, a FGV costuma cobrar a receita e a baixa do estoque vendido."
  },
  {

    o: "O ICMS sobre vendas reduz a receita bruta."
  },
  {
    t: "Seguro Pago Antecipadamente",
    d: "Seguros a Apropriar",
    c: "Caixa/Bancos",
    o: "Pagamento antecipado gera ativo, pois o serviço ainda será consumido."
  },
  {
    t: "Apropriação da Despesa de Seguro",
    d: "Despesa com Seguros",
    c: "Seguros a Apropriar",
    o: "Pelo regime de competência, a despesa é reconhecida mês a mês."
  },
  {
    t: "Receita Recebida Antecipadamente",
    d: "Caixa/Bancos",
    c: "Receita Antecipada",
    o: "Recebeu antes de prestar o serviço: nasce uma obrigação no passivo."
  },
  {
    t: "Apropriação da Receita Antecipada",
    d: "Receita Antecipada",
    c: "Receita de Serviços/Vendas",
    o: "Após prestar o serviço ou entregar o bem, o passivo vira receita."
  },
  {
    t: "Depreciação",
    d: "Despesa de Depreciação ou Custo de Produção",
    c: "Depreciação Acumulada",
    o: "Bem administrativo gera despesa; bem usado na produção gera custo."
  },
  {
    t: "Constituição da PECLD",

    o: "Conta redutora de Clientes no ativo."
  },
  {
    t: "Ajuste a Valor Presente (AVP)",

  {

  {

  },
  {

  },
  {
    t: "Apropriação do FGTS",

  {

  {
    t: "Adiantamento a Fornecedores",

    o: "Empresa pagou antes; para ela é direito no ativo."
  },
  {
    t: "Adiantamento de Salários",
    d: "Adiantamento de Salários",
    c: "Caixa/Bancos",
    o: "Pagamento antes do trabalho do empregado gera ativo."
  },
  {
    t: "Desconto de Duplicatas",
    d: "Caixa/Bancos\nEncargos Financeiros a Transcorrer",
    c: "Empréstimos por Duplicatas Descontadas",
    o: "Tratamento moderno: duplicata descontada gera passivo financeiro."
  },
  {
    t: "Venda de Imobilizado",
    d: "Caixa/Bancos ou Clientes\nDepreciação Acumulada\nPerda na Venda, se houver",
    c: "Imobilizado\nGanho na Venda, se houver",
    o: "Baixa-se o bem, baixa-se a depreciação acumulada e reconhece-se ganho ou perda."
  },
  {
    t: "Compra de Imobilizado",
    d: "Máquinas, Veículos ou Imóveis",
    c: "Caixa/Bancos ou Fornecedores",
    o: "Reconhece o bem no ativo não circulante imobilizado."
  }
];

let atual = 0;
const card = document.getElementById("card");

function renderizar(){
  const item = cards[atual];
  card.classList.remove("flipped");
  document.getElementById("numFrente").innerText = (atual + 1) + "/" + cards.length;
  document.getElementById("numVerso").innerText = (atual + 1) + "/" + cards.length;
  document.getElementById("contador").innerText = "Cartão " + (atual + 1) + " de " + cards.length;
  document.getElementById("textoFrente").innerText = item.t;
  document.getElementById("tituloVerso").innerText = item.t;
  document.getElementById("debito").innerText = item.d;
  document.getElementById("credito").innerText = item.c;
  document.getElementById("obs").innerText = item.o;
}
function virarCartao(){card.classList.toggle("flipped");}
function proximo(e){e.stopPropagation(); atual = (atual + 1) % cards.length; renderizar();}
function anterior(e){e.stopPropagation(); atual = (atual - 1 + cards.length) % cards.length; renderizar();}
function reiniciar(e){e.stopPropagation(); atual = 0; renderizar();}

renderizar();
</script>
</body>
</html>
